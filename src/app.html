<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>

		<!-- html2canvas: required by liquidGL for snapshots (keep before liquidGL.js) -->
		<script
			src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
			defer
		></script>
		<!-- Patches oklch/oklab/color-mix in CSS before each snapshot (Tailwind v4 uses these) -->
		<script src="/scripts/liquidgl-html2canvas-polyfill.js" defer></script>
		<script src="/scripts/liquidGL.js" defer></script>
	</body>
</html>
